<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API Connection Test</title>
</head>
<body>
    <h1>API Connection Test</h1>
    <button onclick="testConnection()">Test API Connection</button>
    <button onclick="testSignup()">Test Signup</button>
    <div id="result"></div>

    <script>
        async function testConnection() {
            const resultDiv = document.getElementById('result');
            try {
                console.log('Testing API connection...');
                const response = await fetch('http://localhost:8000/api/users/csrf_token/', {
                    method: 'GET',
                    credentials: 'include',
                });
                
                if (response.ok) {
                    const data = await response.json();
                    resultDiv.innerHTML = `<p style="color: green;">✅ Connection successful! CSRF Token: ${data.csrfToken ? 'Received' : 'Not received'}</p>`;
                    console.log('Connection successful:', data);
                } else {
                    resultDiv.innerHTML = `<p style="color: red;">❌ Connection failed! Status: ${response.status}</p>`;
                    console.error('Connection failed:', response.status);
                }
            } catch (error) {
                resultDiv.innerHTML = `<p style="color: red;">❌ Connection error: ${error.message}</p>`;
                console.error('Connection error:', error);
            }
        }

        async function testSignup() {
            const resultDiv = document.getElementById('result');
            try {
                console.log('Testing signup...');
                const response = await fetch('http://localhost:8000/api/users/signup/', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    credentials: 'include',
                    body: JSON.stringify({
                        email: 'test3@example.com',
                        password: 'testpass123',
                        name: 'Test User 3',
                        role: 'student'
                    })
                });
                
                if (response.ok) {
                    const data = await response.json();
                    resultDiv.innerHTML = `<p style="color: green;">✅ Signup successful! User ID: ${data.id}</p>`;
                    console.log('Signup successful:', data);
                } else {
                    const errorData = await response.json();
                    resultDiv.innerHTML = `<p style="color: red;">❌ Signup failed! Status: ${response.status}, Error: ${errorData.error || 'Unknown error'}</p>`;
                    console.error('Signup failed:', response.status, errorData);
                }
            } catch (error) {
                resultDiv.innerHTML = `<p style="color: red;">❌ Signup error: ${error.message}</p>`;
                console.error('Signup error:', error);
            }
        }
    </script>
</body>
</html>
